<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- Android Native Color (Dynamic) -->
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1e293b" media="(prefers-color-scheme: dark)" />

  <!-- iOS / Android Mobile Web App Capable -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nil Escala">

  <!-- Android Native Color Scheme -->
  <meta name="color-scheme" content="light dark">

  <title>Nil Escala</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />

  <!-- Tailwind CSS (CDN for simplicity in this setup) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            work: '#4f86c6',
            off: '#cbfcf0',
            holiday: '#ef4444',
            note: '#3b82f6',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.2s ease-out',
            'slide-left': 'slideLeft 0.3s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideLeft: {
              '0%': { transform: 'translateX(100%)' },
              '100%': { transform: 'translateX(0)' },
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    /* Safe Area Utilities for Edge-to-Edge */
    .pt-safe {
      padding-top: env(safe-area-inset-top);
    }

    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom);
    }

    .pl-safe {
      padding-left: env(safe-area-inset-left);
    }

    .pr-safe {
      padding-right: env(safe-area-inset-right);
    }

    /* Combined padding (base + safe area) */
    .pt-safe-3 {
      padding-top: calc(env(safe-area-inset-top) + 0.75rem);
    }

    /* base py-3 */
    .pb-safe-3 {
      padding-bottom: calc(env(safe-area-inset-bottom) + 0.75rem);
    }

    /* base py-3 */
    .pt-safe-4 {
      padding-top: calc(env(safe-area-inset-top) + 1rem);
    }

    /* base p-4 */
    .pb-safe-4 {
      padding-bottom: calc(env(safe-area-inset-bottom) + 1rem);
    }

    /* base p-4 */
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.32.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "jspdf": "https://aistudiocdn.com/jspdf@^3.0.4",
    "path": "https://aistudiocdn.com/path@^0.12.7",
    "vite": "https://aistudiocdn.com/vite@^7.2.7",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.2",
    "fs": "https://aistudiocdn.com/fs@^0.0.1-security",
    "jspdf-autotable": "https://aistudiocdn.com/jspdf-autotable@^5.0.2"
  }
}
</script>
</head>

<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-200">
  <div id="root"></div>

  <!-- Entry Point for Vite -->
  <script type="module" src="/index.tsx"></script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('SW registrado com sucesso: ', registration.scope);
          })
          .catch((err) => {
            console.log('Falha no registro do SW: ', err);
          });
      });
    }
  </script>
</body>

</html>
